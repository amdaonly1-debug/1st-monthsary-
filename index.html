<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #374151; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        .hidden { display: none; }
        button { background: #6366f1; color: white; border: none; padding: 12px 24px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: transform 0.2s; }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div class="card" id="front">
    <h1>1 Month Down!</h1>
    <p>Even with the distance, you're the best part of my day.</p>
    <button onclick="reveal()">See my surprise</button>
</div>

<div class="card hidden" id="message">
    <h2>30 Days, 0 Miles in Heart</h2>
    <p>I know there's distance between us, but I feel closer to you every single day.</p>
    <p>Can't wait for the day we don't have to say goodbye on a screen. Happy Anniversary!</p>
</div>

<script>
    function reveal() {
        document.getElementById('front').classList.add('hidden');
        document.getElementById('message').classList.remove('hidden');
    }
</script>

</body>
</html>
